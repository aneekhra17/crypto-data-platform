# Local, free Airflow (LocalExecutor) to schedule the crypto producer
# every 6 hours -- avoids Amazon MWAA, which costs ~$350+/month minimum,
# nowhere near free-tier friendly for a student project. Same skill,
# hosted for $0 on your laptop, joining the same Docker network as the
# Kafka stack so it can reach it internally (kafka:9093).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    # No host port published -- only Airflow's own containers need this,
    # via the internal Docker network, avoiding any port-conflict risk
    # with your native local Postgres services.

  airflow-init:
    image: apache/airflow:2.10.3-python3.12
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true
    volumes:
      - ./dags:/opt/airflow/dags
      - ../ingestion:/opt/airflow/ingestion

  airflow-webserver:
    image: apache/airflow:2.10.3-python3.12
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
    command: webserver
    ports:
      - "8081:8080"  # 8081 to avoid clashing with Kafka UI's 8080
    volumes:
      - ./dags:/opt/airflow/dags
      - ../ingestion:/opt/airflow/ingestion

  airflow-scheduler:
    image: apache/airflow:2.10.3-python3.12
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ../ingestion:/opt/airflow/ingestion

networks:
  default:
    external: true
    name: crypto-kafka-net
